options:
  randomize_companions:
    type: toggle
    default: true
  randomize_key_items:
    type: toggle
    default: true
  origin_story:
    type: choice
    values: [random, human_noble, dalish_elf, city_elf, dwarf_commoner, dwarf_noble, magi]
    default: random
  death_link:
    type: toggle
    default: false
  accessibility:
    type: choice
    values: [full, minimal, none]
    default: full
  progression_balancing:
    type: range
    min: 0
    max: 99
    default: 50
